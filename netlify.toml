[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Node version
  NODE_VERSION = "18"

# Redirect www to non-www (must come BEFORE SPA fallback)
[[redirects]]
  from = "https://www.gloggva.is/*"
  to = "https://gloggva.is/:splat"
  status = 301
  force = true

# SPA fallback (catch-all for client-side routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false